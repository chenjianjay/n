      transition: all 0.3s ease;
      z-index: 50;
    }

    #back-to-top.show {

      visibility: visible;
    }

    #back-to-top:hover {
      background-color: #4b5563;
      color: white;
      border-color: #4b5563;

    let currentCategory = 'all';

    function renderMotos(category = 'all') {
      const container = document.getElementById('moto-container');
      container.innerHTML = '';

      const filteredMotos = category === 'all' 
        ? motos 
        : motos.filter(m => m.category === category);

      filteredMotos.forEach(moto => {
        const cardHTML = `
          <div class="bg-white rounded-3xl shadow overflow-hidden">
            <img src="${moto.image}" class="w-full h-64 object-cover">
            
            <div class="p-8 space-y-4">
              <h3 class="text-2xl font-bold">${moto.name}</h3>
              
              <div class="space-y-3 text-sm">
                <div class="flex justify-between">
                  <span class="info-label">Preço do veículo:</span>
                  <span class="info-value">${moto.price || '—'}</span>
                </div>
                <div class="flex justify-between">
                  <span class="info-label">IVA 14%:</span>
                  <span class="info-value">${moto.iva || '—'}</span>
                </div>
                <div class="flex justify-between border-t pt-3">
                  <span class="info-label font-semibold">Valor Total:</span>
                  <span class="info-value text-blue-600 text-lg">${moto.total || '—'}</span>
                </div>
                
                <div class="pt-4">
                  <p class="info-label">Dimensões (C×L×A):</p>
                  <p class="info-value">${moto.dimensions || '—'}</p>
                </div>
                
                ${moto.weight ? `
                <div>
                  <p class="info-label">Peso (W):</p>
                  <p class="info-value">${moto.weight}</p>
                </div>` : ''}
                
                <div>
                  <p class="info-label">Tipo de motor:</p>
                  <p class="info-value">${moto.engine || '—'}</p>
                </div>
                
                ${moto.passengers ? `
                <div>
                  <p class="info-label">Número de passageiros:</p>
                  <p class="info-value text-green-600">${moto.passengers}</p>
                </div>` : ''}
              </div>
            </div>
          </div>
        `;
        container.innerHTML += cardHTML;
      });
    }

    function filterCategory(category) {
      currentCategory = category;
      
      document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
        btn.classList.remove('tab-active');
        if (btn.id === `tab-${category}`) btn.classList.add('tab-active');
      });
      
      renderMotos(category);
    }

    function scrollToTop() {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    }

    function toggleBackToTop() {
      const btn = document.getElementById('back-to-top');
      if (window.scrollY > 400) {
        btn.classList.add('show');
      } else {
        btn.classList.remove('show');
      }
    }

    window.onload = () => {
      renderMotos('all');
      window.addEventListener('scroll', toggleBackToTop);
    };
